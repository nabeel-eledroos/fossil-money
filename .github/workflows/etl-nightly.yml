name: Nightly ETL

on:
  schedule:
    - cron: '0 3 * * *'  # 3am UTC daily
  workflow_dispatch:      # Manual trigger
    inputs:
      refresh:
        description: 'Refresh all data (not just missing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Fetch industry data (incremental)
        run: |
          if [ "${{ inputs.refresh }}" = "true" ]; then
            python etl/scripts/fetch_whoboughtmyrep.py --refresh --limit 100
          else
            python etl/scripts/fetch_whoboughtmyrep.py --limit 100
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WHOBOUGHTMYREP_API_KEY: ${{ secrets.WHOBOUGHTMYREP_API_KEY }}

      - name: Aggregate summaries
        run: python etl/scripts/aggregate_summaries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
