name: Nightly ETL

on:
  schedule:
    - cron: '0 3 * * *'  # 3am UTC daily
  workflow_dispatch:      # Manual trigger
    inputs:
      full_refresh:
        description: 'Full refresh (all cycles, ignore progress)'
        required: false
        default: 'false'
        type: boolean
      limit:
        description: 'Max politicians to process per batch (default: all)'
        required: false
        default: ''
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  FEC_API_KEY: ${{ secrets.FEC_API_KEY }}

jobs:
  # Parallel job: fetch contributions across 4 batches
  fetch-contributions:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours per batch
    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Download progress file (if exists)
        continue-on-error: true
        run: |
          python -c "
          import os
          import json
          from supabase import create_client
          
          client = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          result = client.table('etl_runs').select('notes').eq('script', 'fec_progress').order('started_at', desc=True).limit(1).execute()
          
          if result.data and result.data[0].get('notes'):
              progress = json.loads(result.data[0]['notes'])
              os.makedirs('etl/data', exist_ok=True)
              with open('etl/data/fec_fetch_progress.json', 'w') as f:
                  json.dump(progress, f)
              print(f'Restored progress: {len(progress.get(\"completed_politicians\", {}))} politicians completed')
          else:
              print('No previous progress found, starting fresh')
          "

      - name: Ensure fossil committee cache exists
        run: |
          if [ ! -f "etl/data/fec_fossil_committees.json" ]; then
            echo "Building fossil committee cache..."
            timeout 3600 python etl/scripts/fetch_fec_committees.py || true
          fi

      - name: Fetch FEC contributions (batch ${{ matrix.batch }})
        run: |
          TOTAL_BATCHES=4
          BATCH=${{ matrix.batch }}
          
          LIMIT_ARG=""
          if [ -n "${{ inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          
          if [ "${{ inputs.full_refresh }}" = "true" ]; then
            echo "Full refresh mode - batch $BATCH of $TOTAL_BATCHES"
            python etl/scripts/fetch_fec_contributions.py --batch $BATCH --total-batches $TOTAL_BATCHES $LIMIT_ARG
          else
            COMPLETED=$(python -c "
          import json
          from pathlib import Path
          p = Path('etl/data/fec_fetch_progress.json')
          if p.exists():
              data = json.load(open(p))
              print(len(data.get('completed_politicians', {})))
          else:
              print(0)
          ")
            
            if [ "$COMPLETED" -lt 535 ]; then
              echo "Initial load in progress ($COMPLETED/535 complete) - batch $BATCH"
              python etl/scripts/fetch_fec_contributions.py --batch $BATCH --total-batches $TOTAL_BATCHES $LIMIT_ARG
            else
              echo "Initial load complete, running incremental update - batch $BATCH"
              python etl/scripts/fetch_fec_contributions.py --incremental --batch $BATCH --total-batches $TOTAL_BATCHES
            fi
          fi

      - name: Save batch progress to Supabase
        if: always()
        run: |
          python -c "
          import os
          import json
          from datetime import datetime
          from supabase import create_client
          from pathlib import Path
          
          client = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          
          progress_path = Path('etl/data/fec_fetch_progress.json')
          if progress_path.exists():
              with open(progress_path) as f:
                  progress = json.load(f)
              
              client.table('etl_runs').insert({
                  'script': 'fec_progress_batch_${{ matrix.batch }}',
                  'status': 'success',
                  'rows_upserted': len(progress.get('completed_politicians', {})),
                  'started_at': datetime.utcnow().isoformat(),
                  'finished_at': datetime.utcnow().isoformat(),
                  'notes': json.dumps(progress)
              }).execute()
              
              print(f'Batch ${{ matrix.batch }} saved progress: {len(progress.get(\"completed_politicians\", {}))} politicians')
          "

  # Sequential job: runs after all batches complete
  post-fetch:
    runs-on: ubuntu-latest
    needs: fetch-contributions
    if: always()
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Merge batch progress from all batches
        run: |
          python -c "
          import os
          import json
          from datetime import datetime
          from supabase import create_client
          
          client = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          
          # Get progress from all 4 batches (most recent for each)
          merged_progress = {'completed_politicians': {}, 'last_run': None}
          
          for batch in range(4):
              result = client.table('etl_runs').select('notes').eq('script', f'fec_progress_batch_{batch}').order('started_at', desc=True).limit(1).execute()
              if result.data and result.data[0].get('notes'):
                  batch_progress = json.loads(result.data[0]['notes'])
                  # Merge completed politicians
                  for pol_id, data in batch_progress.get('completed_politicians', {}).items():
                      if pol_id not in merged_progress['completed_politicians']:
                          merged_progress['completed_politicians'][pol_id] = data
                      else:
                          # Merge cycles
                          existing_cycles = set(merged_progress['completed_politicians'][pol_id].get('cycles', []))
                          new_cycles = set(data.get('cycles', []))
                          merged_progress['completed_politicians'][pol_id]['cycles'] = list(existing_cycles | new_cycles)
                          # Keep most recent update time
                          if data.get('last_updated', '') > merged_progress['completed_politicians'][pol_id].get('last_updated', ''):
                              merged_progress['completed_politicians'][pol_id]['last_updated'] = data['last_updated']
          
          merged_progress['last_run'] = datetime.utcnow().isoformat()
          
          # Save merged progress to DB
          client.table('etl_runs').insert({
              'script': 'fec_progress',
              'status': 'success',
              'rows_upserted': len(merged_progress['completed_politicians']),
              'started_at': datetime.utcnow().isoformat(),
              'finished_at': datetime.utcnow().isoformat(),
              'notes': json.dumps(merged_progress)
          }).execute()
          
          print(f'Merged progress from 4 batches: {len(merged_progress[\"completed_politicians\"])} politicians total')
          
          # Also save to local file for aggregation step
          os.makedirs('etl/data', exist_ok=True)
          with open('etl/data/fec_fetch_progress.json', 'w') as f:
              json.dump(merged_progress, f, indent=2)
          "

      - name: Fetch candidate totals (for % of funding)
        run: python etl/scripts/fetch_fec_totals.py --limit 200
        continue-on-error: true

      - name: Fetch outside spending (weekly on Sundays)
        if: github.event.schedule == '0 3 * * 0' || inputs.full_refresh == 'true'
        run: python etl/scripts/fetch_fec_outside_spending.py --limit 200
        continue-on-error: true

      - name: Aggregate summaries
        run: python etl/scripts/aggregate_summaries.py

      - name: Log completion
        run: |
          python -c "
          import os
          from datetime import datetime
          from supabase import create_client
          
          client = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          client.table('etl_runs').insert({
              'script': 'etl-nightly',
              'status': 'success',
              'started_at': datetime.utcnow().isoformat(),
              'finished_at': datetime.utcnow().isoformat(),
              'notes': 'FEC contributions + aggregation complete'
          }).execute()
          "
